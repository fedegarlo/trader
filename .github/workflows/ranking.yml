name: Ranking diario

on:
  schedule:
    # Todos los días a las 22:30 UTC (tras el cierre de la bolsa de EE. UU.)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}
  # La web (docs/subir.html) lanza este evento tras subir un extracto: los
  # commits creados por la API de GitHub no disparan el evento `push`, así que
  # este `repository_dispatch` garantiza que el ranking se recalcule al subir.
  repository_dispatch:
    types: [extracto-subido]
  push:
    branches: [main]
    paths:
      - "players/**"
      - "trader/**"

permissions:
  contents: write
  issues: write

concurrency:
  group: ranking
  cancel-in-progress: true

jobs:
  ranking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Tests
        run: python -m pytest tests/ -q

      - name: Calcular ranking
        env:
          # Frase de paso COMPARTIDA de la liga: con ella se cifran (y se
          # descifran) todos los extractos. Créala UNA sola vez en
          # Settings -> Secrets and variables -> Actions con nombre TRADER_KEY.
          # Añadir un jugador nuevo NO requiere tocar nada aquí ni crear más
          # secrets. Los extractos se suben sin PR desde docs/subir.html.
          TRADER_KEY: ${{ secrets.TRADER_KEY }}
        run: python -m trader ranking --refresh

      - name: Publicar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/public/ data/prices/
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "Actualizar ranking $(date -u +%F)"
            git pull --rebase origin main
            git push
          fi

      - name: Avisar de extractos sin descifrar
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let pending = [];
            try { pending = JSON.parse(fs.readFileSync("pending.json", "utf8")); } catch (e) {}
            const MARKER = "Extractos sin descifrar";
            const list = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: "open", per_page: 100,
            });
            const existing = list.find(i => !i.pull_request && i.title.includes(MARKER));

            if (pending.length) {
              const rows = pending.map(p => `- **${p.name}** (\`players/${p.id}/\`)`).join("\n");
              const body = [
                "Estos extractos están subidos pero **no se han podido descifrar** en el último recálculo:",
                "", rows, "",
                "Causa casi segura: la **frase de paso** con la que se cifró **no coincide con la de " +
                "la liga** (el secret `TRADER_KEY`). Solución: que esa persona **vuelva a subir** su " +
                "extracto desde `docs/subir.html` con la frase compartida correcta.",
                "", "_Esta issue se actualiza y se cierra sola cuando el extracto se descifra._",
              ].join("\n");
              if (existing) {
                await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number, body });
              } else {
                await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo,
                  title: "⚠️ " + MARKER, body });
              }
            } else if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body: "✅ Todos los extractos se descifran correctamente. Cierro." });
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, state: "closed" });
            }
