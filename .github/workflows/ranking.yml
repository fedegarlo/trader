name: Ranking diario

on:
  schedule:
    # Todos los días a las 22:30 UTC (tras el cierre de la bolsa de EE. UU.)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "players/**"
      - "trader/**"

permissions:
  contents: write

concurrency:
  group: ranking
  cancel-in-progress: true

jobs:
  ranking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Tests
        run: python -m pytest tests/ -q

      - name: Calcular ranking
        env:
          # Todos los secrets del repo en un solo JSON: trader busca ahí la
          # clave PLAYER_<ID>_KEY de cada jugador. Así, dar de alta a alguien
          # nuevo solo requiere crear su secret en
          # Settings -> Secrets and variables -> Actions (no hay que tocar
          # este fichero). Los extractos se pueden subir sin PR desde
          # docs/subir.html.
          TRADER_SECRETS_JSON: ${{ toJSON(secrets) }}
          # El jugador demo usa datos ficticios: su clave es pública a
          # propósito (no es un secret). Elimina esta línea (y players/demo/)
          # cuando ya no haga falta.
          PLAYER_DEMO_KEY: demo
        run: python -m trader ranking --refresh

      - name: Publicar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/public/ data/prices/
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar"
          else
            git commit -m "Actualizar ranking $(date -u +%F)"
            git push
          fi
